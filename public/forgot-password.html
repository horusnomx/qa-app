<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — QA App</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema" data-testid="btn-theme-toggle">🌙</button>

  <div class="container" style="max-width:420px;margin:4rem auto;">
    <h1 style="text-align:center;margin-bottom:.25rem;">QA App</h1>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:2rem;font-size:.9rem;">
      Recuperar contraseña
    </p>

    <!-- ── PASO 1: solicitar reset ── -->
    <div id="panel-solicitar">
      <h2 style="margin-bottom:.5rem;font-size:1.1rem;">¿Olvidaste tu contraseña?</h2>
      <p style="font-size:.9rem;color:var(--text-muted);margin-bottom:1.25rem;">
        Ingresa tu email y recibirás un link para resetear tu contraseña.
      </p>

      <div id="forgot-error" class="alert alert-error" style="display:none;" data-testid="forgot-error"></div>

      <form id="forgot-form" novalidate>
        <div class="field">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" type="email" placeholder="tu@email.com"
                 autocomplete="email" required data-testid="input-forgot-email">
        </div>
        <div class="form-actions" style="flex-direction:column;gap:.75rem;">
          <button type="submit" style="width:100%;justify-content:center;" data-testid="btn-solicitar-reset">
            Enviar link de reset
          </button>
          <p style="text-align:center;font-size:.9rem;margin:0;">
            <a href="/index.html" data-testid="link-volver-login">← Volver al login</a>
          </p>
        </div>
      </form>
    </div>

    <!-- ── PASO 2: mostrar link generado ── -->
    <div id="panel-resultado" style="display:none;">
      <div class="alert alert-success" data-testid="forgot-success">
        ✅ Link de reset generado correctamente.
      </div>

      <div style="margin:1.25rem 0;padding:1rem;background:var(--surface2);border-radius:8px;border:1px solid var(--border2);">
        <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:.5rem;">
          Comparte este link con el usuario (expira en 1 hora):
        </p>
        <a id="reset-url-display" href="#" target="_blank"
           style="word-break:break-all;font-size:.85rem;"
           data-testid="reset-url"></a>
      </div>

      <button class="btn" onclick="copiarLink()" style="width:100%;justify-content:center;margin-bottom:.75rem;"
              data-testid="btn-copiar-link">
        Copiar link
      </button>
      <p style="text-align:center;font-size:.9rem;">
        <a href="/index.html">← Volver al login</a>
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => initForgotPassword());

    function copiarLink() {
      const url = document.getElementById('reset-url-display').href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('[data-testid="btn-copiar-link"]');
        btn.textContent = '✅ Copiado';
        setTimeout(() => btn.textContent = 'Copiar link', 2000);
      });
    }
  </script>
</body>
</html>
