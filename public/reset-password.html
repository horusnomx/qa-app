<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resetear contraseña — QA App</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema" data-testid="btn-theme-toggle">🌙</button>

  <div class="container" style="max-width:420px;margin:4rem auto;">
    <h1 style="text-align:center;margin-bottom:.25rem;">QA App</h1>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:2rem;font-size:.9rem;">
      Nueva contraseña
    </p>

    <!-- Token inválido / expirado -->
    <div id="panel-token-invalido" style="display:none;">
      <div class="alert alert-error" data-testid="token-invalido">
        ❌ El link de reset es inválido o ha expirado.
      </div>
      <p style="text-align:center;margin-top:1rem;">
        <a href="/forgot-password.html">Solicitar un nuevo link</a>
      </p>
    </div>

    <!-- Formulario de nueva contraseña -->
    <div id="panel-reset">
      <h2 style="margin-bottom:.5rem;font-size:1.1rem;">Ingresa tu nueva contraseña</h2>

      <div id="reset-error" class="alert alert-error" style="display:none;" data-testid="reset-error"></div>

      <form id="reset-form" novalidate>
        <div class="field">
          <label for="nueva-password">Nueva contraseña</label>
          <input id="nueva-password" type="password" placeholder="Mínimo 6 caracteres"
                 autocomplete="new-password" required data-testid="input-nueva-password">
        </div>
        <div class="field">
          <label for="confirmar-password">Confirmar contraseña</label>
          <input id="confirmar-password" type="password" placeholder="Repite tu contraseña"
                 autocomplete="new-password" required data-testid="input-confirmar-password">
        </div>
        <div class="form-actions" style="flex-direction:column;gap:.75rem;">
          <button type="submit" style="width:100%;justify-content:center;" data-testid="btn-resetear">
            Cambiar contraseña
          </button>
        </div>
      </form>
    </div>

    <!-- Éxito -->
    <div id="panel-exito" style="display:none;">
      <div class="alert alert-success" data-testid="reset-success">
        ✅ Contraseña actualizada correctamente.
      </div>
      <p style="text-align:center;margin-top:1rem;">
        <a href="/index.html" data-testid="link-ir-login">Iniciar sesión →</a>
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => initResetPassword());
  </script>
</body>
</html>
