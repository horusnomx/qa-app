<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — QA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">

    <!-- Panel izquierdo decorativo -->
    <aside class="auth-panel">
      <div class="panel-brand">QA App</div>

      <div class="panel-hero">
        <h1 class="panel-title">Empieza<br>desde<br><span>cero.</span></h1>
        <p class="panel-desc">Crea tu cuenta en segundos. Sin configuraciones, sin distracciones. Solo tus tareas.</p>
      </div>

      <div class="panel-footer">v1.0.0 · Supabase · Railway</div>
    </aside>

    <!-- Panel derecho: formulario -->
    <main class="auth-form-wrap">
      <div class="auth-form-inner">
        <h2 class="auth-heading">Crear cuenta</h2>
        <p class="auth-sub">Completa los datos para registrarte.</p>

        <div id="error-message" class="error-banner hidden" data-testid="error-message"></div>
        <div id="success-message" class="success-banner hidden" data-testid="success-message"></div>

        <form id="registro-form" data-testid="registro-form" novalidate>
          <div class="field">
            <label for="nombre">Nombre</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              data-testid="input-nombre"
              placeholder="Tu nombre"
              autocomplete="name"
              required
            >
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              data-testid="input-email"
              placeholder="tu@email.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              data-testid="input-password"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              required
            >
          </div>

          <button type="submit" class="btn-primary" data-testid="btn-registro">Crear cuenta →</button>
        </form>

        <p class="alt-link">¿Ya tienes cuenta? <a href="index.html" data-testid="link-login">Iniciar sesión</a></p>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
